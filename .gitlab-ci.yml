image: docker:24

services:
  - docker:dind

stages:
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""

deploy:
  stage: deploy
  only:
    - main
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts

  script:
    # Build image in CI
    - docker build -t data4worker:latest .

    # Export image
    - docker save data4worker:latest | gzip > image.tar.gz

    # Upload image
    - scp image.tar.gz "$SERVER_USER@$SERVER_IP:/tmp/image.tar.gz"

    # Deploy remotely
    - |
      ssh "$SERVER_USER@$SERVER_IP" << 'EOF'
        set -e
        docker load < /tmp/image.tar.gz
        docker stop data-experience || true
        docker rm data-experience || true
        docker run -d \
          --name data-experience \
          --restart unless-stopped \
          -p 80:8080 \
          data-experience:latest
        rm /tmp/image.tar.gz
      EOF
